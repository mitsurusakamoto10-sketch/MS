<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- スマホで正しい幅・拡大率で表示するための設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>マイポータル</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <!-- 株価バー（実データ・約60秒ごとに自動更新） -->
      <section class="ticker" id="stock-ticker" aria-label="注目株価">
        <div class="strip-loading">株価を読み込み中…</div>
      </section>

      <!-- 東京の天気（実データ・約10分ごとに自動更新）
           左：これから12時間 / 右：週間（明日以降） -->
      <section class="weather-wrap" aria-label="東京の天気">
        <div class="weather-head">
          <h2>東京の天気</h2>
          <span class="hourly-updated" id="weather-updated"></span>
        </div>
        <div class="weather-cols">
          <div class="weather-col hourly-col">
            <h3 class="weather-subtitle">これから12時間</h3>
            <div class="hourly-scroll" id="hourly-weather">
              <div class="strip-loading">天気を読み込み中…</div>
            </div>
          </div>
          <div class="weather-col weekly-col">
            <h3 class="weather-subtitle">週間（明日以降）</h3>
            <div class="weekly-list" id="weekly-weather">
              <div class="strip-loading">読み込み中…</div>
            </div>
          </div>
        </div>
      </section>

      <!-- ページ上部の見出し（あいさつ・日付は script.js が自動でセット） -->
      <header class="page-header">
        <p class="greeting" id="greeting">おはようございます</p>
        <h1>マイポータル</h1>
        <p class="today" id="today-date"></p>
        <p class="subtitle">今日の確認事項をまとめてチェック</p>
      </header>

      <!-- カードを並べるエリア。中身は script.js が組み立てます -->
      <section class="grid">
        <!-- 1. 今日のToDo -->
        <article class="card">
          <div class="card-header"><span class="icon">✅</span><h2>今日のToDo</h2></div>
          <div class="card-body" id="todo-card"></div>
        </article>

        <!-- 2. メモ・備忘録 -->
        <article class="card">
          <div class="card-header"><span class="icon">📝</span><h2>メモ・備忘録</h2></div>
          <div class="card-body" id="memo-card"></div>
        </article>

        <!-- 3. プレスリリース更新 -->
        <article class="card">
          <div class="card-header"><span class="icon">📣</span><h2>プレスリリース更新</h2></div>
          <div class="card-body" id="press-card"></div>
        </article>

        <!-- 5. EDINET / 上場REIT物件取引チェック -->
        <article class="card">
          <div class="card-header"><span class="icon">🏢</span><h2>EDINET / REIT物件取引</h2></div>
          <div class="card-body" id="disclosure-card"></div>
        </article>

        <!-- 6. MLBドジャース速報 -->
        <article class="card">
          <div class="card-header"><span class="icon">⚾</span><h2>MLBドジャース速報</h2></div>
          <div class="card-body" id="dodgers-card"></div>
        </article>
      </section>

      <footer class="page-footer">
        株価・天気は実データです。ToDoはこのブラウザに保存されます。メモ・プレスリリース・REIT・MLBはサンプル表示です。
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>

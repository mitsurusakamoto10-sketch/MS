<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- スマホで正しい幅・拡大率で表示するための設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>マイポータル</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <!-- 最上部バー：ロゴ + 本日の日付/現在時刻 + AIリンク（コンパクト） -->
      <header class="topbar">
        <div class="brand">Myworkportal</div>
        <div class="topbar-right">
          <div class="clock">
            <span class="clock-date" id="today-date"></span>
            <span class="clock-time" id="clock-time"></span>
          </div>
          <nav class="quick-links" aria-label="AIサービス">
            <a class="ai-link" href="https://chatgpt.com" target="_blank" rel="noopener" title="ChatGPT" aria-label="ChatGPTを開く">
              <img src="https://cdn.simpleicons.org/openai/444444" alt="ChatGPT" width="30" height="30" />
            </a>
            <a class="ai-link" href="https://claude.ai" target="_blank" rel="noopener" title="Claude" aria-label="Claudeを開く">
              <img src="https://cdn.simpleicons.org/claude/D97757" alt="Claude" width="30" height="30" />
            </a>
          </nav>
        </div>
      </header>

      <!-- 株価バー（実データ・約60秒ごとに自動更新） -->
      <section class="ticker" id="stock-ticker" aria-label="注目株価">
        <div class="strip-loading">株価を読み込み中…</div>
      </section>

      <!-- 東京の天気（実データ・約10分ごとに自動更新）株価と同じスリムな横ストリップ -->
      <section class="strip weather-strip" aria-label="東京の天気">
        <div class="strip-scroll" id="weather-track">
          <div class="strip-loading">天気を読み込み中…</div>
        </div>
        <span class="strip-updated" id="weather-updated"></span>
      </section>

      <!-- カードを並べるエリア。中身は script.js が組み立てます -->
      <!-- 主要総合ディベロッパーのプレスリリース・ニュース（直近1週間・実データ） -->
      <section class="news" aria-label="ディベロッパー プレスリリース">
        <div class="news-head">
          <h2>総合ディベロッパー プレスリリース（直近1週間）</h2>
          <span class="strip-updated" id="news-updated"></span>
        </div>
        <div class="news-grid" id="news-grid">
          <div class="strip-loading">プレスリリースを読み込み中…</div>
        </div>
      </section>

      <!-- カードを並べるエリア。中身は script.js が組み立てます -->
      <section class="grid">
        <!-- EDINET / 上場REIT物件取引チェック -->
        <article class="card">
          <div class="card-header"><span class="icon">🏢</span><h2>EDINET / REIT物件取引</h2></div>
          <div class="card-body" id="disclosure-card"></div>
        </article>

        <!-- MLBドジャース速報 -->
        <article class="card">
          <div class="card-header"><span class="icon">⚾</span><h2>MLBドジャース速報</h2></div>
          <div class="card-body" id="dodgers-card"></div>
        </article>
      </section>

      <footer class="page-footer">
        株価・天気・プレスリリースは実データです。REIT・MLBはサンプル表示です。
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>

name: hotel-map

on:
  workflow_dispatch:
    inputs:
      market:
        description: "マーケット名称（スライド見出し・ファイル名に使用。未指定ならdata/market.txtを使用）"
        required: false
  push:
    paths:
      - "data/hotels.csv"
      - "hotel-map/**"
      - ".github/workflows/hotel-map.yml"

permissions:
  contents: write

concurrency:
  group: hotel-map-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r hotel-map/requirements.txt

      - name: Build PPTX
        run: |
          MARKET="${{ github.event.inputs.market }}"
          if [ -z "$MARKET" ] && [ -f data/market.txt ]; then MARKET="$(head -n1 data/market.txt | tr -d '\r\n')"; fi
          if [ -z "$MARKET" ]; then
            echo "::error::マーケット名称が指定されていません。data/market.txt を置くか、workflow_dispatch実行時に market を指定してください。"
            exit 1
          fi
          echo "market = $MARKET"
          python hotel-map/build.py --csv data/hotels.csv --market "$MARKET"

      - name: Commit outputs back to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/ data/geocode_cache.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: ベンチマークホテルPPTXを自動生成 [skip ci]"
            git push
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-hotels-pptx
          path: output/
